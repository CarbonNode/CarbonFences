name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish CarbonZones/CarbonZones.csproj -c Release -r win-x64 --self-contained -o publish/CarbonZones

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CarbonZones-publish
          path: publish/CarbonZones/

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: CarbonZones-Installer
          path: installer_output/CarbonZones-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/CarbonZones-Setup.exe
          generate_release_notes: true
